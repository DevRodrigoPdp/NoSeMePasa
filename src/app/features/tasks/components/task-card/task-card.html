<article class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
  <div class="flex items-start justify-between gap-4">
    <div>
      <h3 class="font-semibold text-slate-900">
        {{ task().title }}
      </h3>

      @if (task().description) {
        <p class="mt-1 text-sm text-slate-500">
          {{ task().description }}
        </p>
      }
    </div>

    @if (task().isImportant) {
      <span class="rounded-full bg-amber-100 px-2.5 py-1 text-xs font-medium text-amber-700">
        Importante
      </span>
    }
  </div>

  <div class="mt-4 flex flex-wrap gap-2 text-xs">
    <span class="rounded-full bg-slate-100 px-2.5 py-1 text-slate-600">
      {{ task().category }}
    </span>

    <span class="rounded-full bg-slate-100 px-2.5 py-1 text-slate-600">
      Prioridad: {{ task().priority }}
    </span>

    @if (task().dueDate) {
      <span class="rounded-full bg-slate-100 px-2.5 py-1 text-slate-600">
        Fecha: {{ task().dueDate }}
      </span>
    } @else {
      <span class="rounded-full bg-slate-100 px-2.5 py-1 text-slate-600">
        Sin fecha
      </span>
    }
  </div>
  <div class="mt-4 flex flex-wrap gap-2">
  @if (task().status !== 'completed') {
    <button
      type="button"
      class="rounded-xl bg-slate-950 px-3 py-2 text-sm font-medium text-white transition hover:bg-slate-800"
      (click)="onComplete()"
    >
      Completar
    </button>
  }

  <button
    type="button"
    class="rounded-xl border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
    (click)="onToggleImportant()"
  >
    @if (task().isImportant) {
      Quitar importante
    } @else {
      Marcar importante
    }
  </button>

  <button
    type="button"
    class="rounded-xl border border-red-200 px-3 py-2 text-sm font-medium text-red-600 transition hover:bg-red-50"
    (click)="onDelete()"
  >
    Eliminar
  </button>
</div>
</article>

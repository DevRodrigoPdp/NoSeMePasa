<form
  class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm"
  [formGroup]="taskForm"
  (ngSubmit)="onSubmit()"
>
  <div class="mb-5">
    <h2 class="text-lg font-semibold text-slate-900">Crear tarea avanzada</h2>
    <p class="mt-1 text-sm text-slate-500">
      Añade más detalles si quieres organizar mejor la tarea.
    </p>
  </div>

  <div class="space-y-4">
    <div>
      <label for="title" class="mb-2 block text-sm font-medium text-slate-700">
        Título
      </label>

      <input
        id="title"
        type="text"
        formControlName="title"
        class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-400"
        placeholder="Ej: llamar al médico"
      />

      @if (taskForm.controls.title.invalid && taskForm.controls.title.touched) {
        <p class="mt-2 text-sm text-red-500">
          El título es obligatorio.
        </p>
      }
    </div>

    <div>
      <label for="description" class="mb-2 block text-sm font-medium text-slate-700">
        Descripción
      </label>

      <textarea
        id="description"
        formControlName="description"
        rows="3"
        class="w-full resize-none rounded-2xl border border-slate-200 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-400"
        placeholder="Ej: pedir cita para revisión general"
      ></textarea>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <div>
        <label for="category" class="mb-2 block text-sm font-medium text-slate-700">
          Categoría
        </label>

        <select
          id="category"
          formControlName="category"
          class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-400"
        >
          <option value="personal">Personal</option>
          <option value="work">Trabajo</option>
          <option value="health">Salud</option>
          <option value="shopping">Compras</option>
          <option value="home">Casa</option>
          <option value="other">Otro</option>
        </select>
      </div>

      <div>
        <label for="priority" class="mb-2 block text-sm font-medium text-slate-700">
          Prioridad
        </label>

        <select
          id="priority"
          formControlName="priority"
          class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-400"
        >
          <option value="low">Baja</option>
          <option value="medium">Media</option>
          <option value="high">Alta</option>
        </select>
      </div>
    </div>

    <div>
      <label for="dueDate" class="mb-2 block text-sm font-medium text-slate-700">
        Fecha
      </label>

      <input
        id="dueDate"
        type="date"
        formControlName="dueDate"
        class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-400"
      />
    </div>

    <label class="flex items-center gap-3 rounded-2xl border border-slate-200 px-4 py-3">
      <input
        type="checkbox"
        formControlName="isImportant"
        class="h-4 w-4 rounded border-slate-300"
      />

      <span class="text-sm font-medium text-slate-700">
        Marcar como importante
      </span>
    </label>
  </div>

  <button
    type="submit"
    class="mt-6 w-full rounded-2xl bg-slate-950 px-5 py-3 font-medium text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:bg-slate-300"
    [disabled]="taskForm.invalid"
  >
    Crear tarea
  </button>
</form>

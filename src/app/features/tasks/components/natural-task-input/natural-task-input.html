<form
  class="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm"
  (ngSubmit)="onSubmit()"
>
  <label for="taskTitle" class="mb-2 block text-sm font-medium text-slate-700">
    Nueva tarea
  </label>

  <textarea
    id="taskTitle"
    name="taskTitle"
    [(ngModel)]="taskTitle"
    class="min-h-28 w-full resize-none rounded-2xl border border-slate-200 p-4 text-slate-800 outline-none focus:border-slate-400"
    placeholder="Ej: llamar al médico"
  ></textarea>

  <button
    type="submit"
    class="mt-4 w-full rounded-2xl bg-slate-950 px-5 py-3 font-medium text-white transition hover:bg-slate-800"
  >
    Añadir tarea
  </button>
</form>

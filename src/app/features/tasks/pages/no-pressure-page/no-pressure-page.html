<section class="mx-auto flex min-h-screen w-full max-w-3xl flex-col px-6 py-10">
  <header class="mb-8">
    <p class="text-sm font-medium text-slate-500">
      Modo tranquilo
    </p>

    <h1 class="mt-2 text-3xl font-bold tracking-tight text-slate-950">
      No me agobies
    </h1>

    <p class="mt-3 text-slate-600">
      No tienes que hacerlo todo ahora. Céntrate solo en una cosa.
    </p>
  </header>

  @if (task(); as recommendedTask) {
    <div class="mb-4 rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
      <p class="text-sm font-medium text-slate-500">
        Ahora céntrate en esto:
      </p>

      <div class="mt-4">
        <app-task-card
          [task]="recommendedTask"
          (complete)="completeTask($event)"
          (toggleImportant)="toggleImportant($event)"
          (delete)="deleteTask($event)"
        />
      </div>
    </div>
  } @else {
    <div class="rounded-3xl border border-dashed border-slate-300 bg-white p-8 text-center">
      <h2 class="text-lg font-semibold text-slate-900">
        No hay nada pendiente ahora mismo.
      </h2>

      <p class="mt-2 text-slate-500">
        Buen momento para descansar o apuntar algo nuevo cuando lo necesites.
      </p>
    </div>
  }
</section>

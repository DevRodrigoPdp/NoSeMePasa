<section class="mx-auto max-w-4xl space-y-6 mt-10">
  <div>
    <p class="text-sm font-medium text-slate-500">Tareas con fecha futura</p>
    <h1 class="mt-1 text-3xl font-bold text-slate-900">Próximos días</h1>
    <p class="mt-2 text-slate-600">
      Aquí aparecen las tareas pendientes que tienen una fecha más adelante.
    </p>
  </div>

  <app-task-list
    [tasks]="tasks()"
    (complete)="completeTask($event)"
    (toggleImportant)="toggleImportant($event)"
    (delete)="deleteTask($event)"
  />
</section>

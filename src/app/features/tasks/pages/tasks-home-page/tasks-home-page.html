<section class="mx-auto flex min-h-screen w-full max-w-4xl flex-col px-6 py-10">
  <header class="mb-8">
    <p class="text-sm font-medium text-slate-500">NoSeMePasa AI</p>

    <h1 class="mt-2 text-3xl font-bold tracking-tight text-slate-950">¿Qué no quieres olvidar?</h1>

    <p class="mt-3 text-slate-600">
      Escribe una tarea sencilla. Más adelante la IA convertirá textos desordenados en tareas
      organizadas.
    </p>
  </header>

  <form
    class="mb-8 rounded-3xl border border-slate-200 bg-white p-4 shadow-sm"
    (ngSubmit)="addTask()"
  >
    <label for="taskTitle" class="mb-2 block text-sm font-medium text-slate-700">
      Nueva tarea
    </label>

    <textarea
      id="taskTitle"
      name="taskTitle"
      [(ngModel)]="taskTitle"
      class="min-h-28 w-full resize-none rounded-2xl border border-slate-200 p-4 text-slate-800 outline-none focus:border-slate-400"
      placeholder="Ej: llamar al médico"
    ></textarea>

    <button
      type="submit"
      class="mt-4 w-full rounded-2xl bg-slate-950 px-5 py-3 font-medium text-white transition hover:bg-slate-800"
    >
      Añadir tarea
    </button>
  </form>

  <div class="mb-4 flex items-center justify-between">
    <h2 class="text-lg font-semibold text-slate-900">Pendientes</h2>

    <span class="rounded-full bg-slate-200 px-3 py-1 text-sm text-slate-700">
      {{ tasks().length }}
    </span>
  </div>

  <app-task-list
    [tasks]="tasks()"
    (complete)="completeTask($event)"
    (toggleImportant)="toggleImportant($event)"
    (delete)="deleteTask($event)"
  />
</section>

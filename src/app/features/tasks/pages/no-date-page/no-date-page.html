<section class="mx-auto max-w-4xl space-y-6 mt-10">
  <div>
    <p class="text-sm font-medium text-slate-500">Tareas sin fecha</p>
    <h1 class="mt-1 text-3xl font-bold text-slate-900">Sin fecha</h1>
    <p class="mt-2 text-slate-600">
      Aquí aparecen las tareas que todavía no tienen un día concreto asignado.
    </p>
  </div>

  <app-task-list
    [tasks]="tasks()"
    (complete)="completeTask($event)"
    (toggleImportant)="toggleImportant($event)"
    (delete)="deleteTask($event)"
  />
</section>
